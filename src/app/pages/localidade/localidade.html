<!--utilizacao do container criado no projeto anterior-->
<app-container>
  <!--titulo da aplicacao-->
  <h1 class="titulo">Localidades</h1>
  <!--seletor de estado-->
  <!--controla a selecao do estado atraves da variavel (estadoSelecionado)-->
  <app-seletor-estado
    (estadoChange)="estadoSelecionado = $event">
  </app-seletor-estado>
  <!--seletor de municipio-->
  <!--controla a selecao do estado atraves da variavel (estadoSelecionado) para so entao habilitar os municipios-->
  <app-seletor-municipio
    [estadoSelecionado]="estadoSelecionado">
  </app-seletor-municipio>
</app-container>
