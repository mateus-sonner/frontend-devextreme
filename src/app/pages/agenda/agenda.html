<!--container principal da pagina-->
<app-container>
  <!--container do cabecalho-->
  <app-cabecalho></app-cabecalho>
  <!-- classe criada para estilizacao do botao de adicionar contato-->
  <div class="botao-adicionar">

    <!--Botao para adicionar novo contato onde ao clicar abre uma popup para informar dados-->
    <dx-button
      text="Novo Contato"
      icon="plus"
      type="default"
      stylingMode="contained"
      (onClick)="abrirPopup()">
    </dx-button>

    <!--Declaracao das propriedades da popup para adicionar novo contato-->
    <dx-popup
      [(visible)]="popupVisivel"
      [width]="400"
      [height]="350"
      title="{{ modoEdicao ? 'Editar Contato' : 'Novo Contato' }}"
      [showCloseButton]="true"
      [dragEnabled]="false"
      [hideOnOutsideClick]="true">

      <!--Template personalizado para receber dados de novo contato-->
      <div *dxTemplate="let data of 'content'">
        <!--agrupa a validacao de todos os campos internos-->
        <dx-validation-group
          validationGroup="grupoContato">
          <!--cria o formulario novo contato e liga o mesmo ao objeto-->
          <dx-form
            [formData]="novoContato"
            [colCount]="1">
            <!--cria o campo nome no formulario ligando a propriedade nome do objeto novoContato-->
            <dxi-item
              dataField="nome"
              editorType="dxTextBox"
              [isRequired]="true"
              [editorOptions]="{
              validationMessageMode: 'always'}">
              <!--faz a validacao do campo nome como obrigatório-->
              <dxi-validation-rule
                type="required"
                message="Nome é obrigatório">
              </dxi-validation-rule>
            </dxi-item>
            <!--cria o campo telefone no formulario já com mascara ligando a propriedade telefone do objeto novoContato-->
            <dxi-item
              dataField="telefone"
              editorType="dxTextBox"
              [isRequired]="true"
              [editorOptions]="{
                mask: '(00) 00000-0000',
                useMaskedValue: true
              }">
              <!--faz a validacao do campo telefone como obrigatório-->
              <dxi-validation-rule
                type="required"
                message="Telefone é obrigatório">
              </dxi-validation-rule>
            </dxi-item>
          </dx-form>
          <!--cria o botao de salvar contato dentro da popup chamando salvarcontato ao clicar-->
          <dx-button
            text="Salvar"
            type="success"
            validationGroup="grupoContato"
            (onClick)="salvarContato()">
          </dx-button>
        </dx-validation-group>
      </div>
    </dx-popup>

  </div>

  <!--cria uma lista de contatos com busca automatica e agrupamento-->
  <dx-list class="list"
           [dataSource]="contatos"
           displayExpr="nome"
           [searchEnabled]="true"
           searchExpr="nome"
           [grouped]="true"
           groupTemplate="group"
           searchMode="contains"
           noDataText="Nenhum contato encontrado"
           [searchEditorOptions]="{
           placeholder: 'Buscar contatos...'}">

    <!--cria o agrupamento por letra inicial do contato-->
    <div *dxTemplate="let grupo of 'group'">
      <div class="grupo">
        {{ grupo.key }}
      </div>
    </div>

    <!--cria os contatos de acordo com a letra inicial podendo editar e excluir os mesmos-->
    <div *dxTemplate="let contato of 'item'">
      <div class="contato-item">
        <strong>{{ contato.nome }}</strong>
        <span>{{ contato.telefone }}</span>
        <div class="botoes">
          <dx-button
            stylingMode="text"
            (onClick)="editarContato(contato)">
            <img src="pencil-square.png">
          </dx-button>
          <dx-button
            stylingMode="text"
            (onClick)="excluirContato(contato)">
            <img src="trash.png">
          </dx-button>
        </div>
      </div>
    </div>
  </dx-list>

</app-container>
