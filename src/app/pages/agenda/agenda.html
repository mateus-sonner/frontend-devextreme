<app-container>

  <app-cabecalho></app-cabecalho>

  <div class="botao-adicionar">

    <!--Botao para adicionar novo contato onde ao clicar abre uma popup para informar dados-->
    <dx-button
      text="Novo Contato"
      icon="plus"
      type="default"
      stylingMode="contained"
      (onClick)="abrirPopup()">
    </dx-button>

    <!--Declaracao das propriedades da popup para adicionar novo contato-->
    <dx-popup
      [(visible)]="popupVisivel"
      [width]="400"
      [height]="350"
      title="Novo Contato"
      [showCloseButton]="true"
      [dragEnabled]="false"
      [hideOnOutsideClick]="true">

      <!--Criacao do popup personalizado para cadastro de novo contato-->
      <div *dxTemplate="let data of 'content'">

        <!--permite a validacao de todos os campos da popup para cadastro de novo contato-->
        <dx-validation-group>

          <div class="formulario">

            <!--Cria um campo de texto ligado a variavel novoContato.nome com validação obrigatoria-->
            <dx-text-box
              placeholder="Nome"
              [(value)]="novoContato.nome">
              <dx-validator>
                <dxi-validation-rule
                  type="required"
                  message="Nome é obrigatório">
                </dxi-validation-rule>
              </dx-validator>
            </dx-text-box>

            <!--Cria um campo de texto ligado a variavel novoContato.telefone com mascara e validação obrigatoria-->
            <dx-text-box
              placeholder="Telefone"
              [(value)]="novoContato.telefone"
              mask="(00) 00000-0000">
              <dx-validator>
                <dxi-validation-rule
                  type="required"
                  message="Telefone é obrigatório">
                </dxi-validation-rule>
              </dx-validator>
            </dx-text-box>

            <!--cria um botao que salva os dados no momento do clique-->
            <dx-button
              text="Salvar"
              type="success"
              (onClick)="salvarContato($event)">
            </dx-button>

          </div>

        </dx-validation-group>

      </div>

    </dx-popup>

  </div>

  <!--cria uma lista de contatos com busca automatica e agrupamento-->
  <dx-list class="list"
           [dataSource]="contatos"
           displayExpr="nome"
           [searchEnabled]="true"
           searchExpr="nome"
           [grouped]="true"
           groupTemplate="group"
           searchMode="contains"
           [searchEditorOptions]="{
           placeholder: 'Buscar contatos...'}">

    <!--cria o agrupamento por letra inicial do contato-->
    <div *dxTemplate="let grupo of 'group'">
      <div class="grupo">
        {{ grupo.key }}
      </div>
    </div>

    <!--cria os contatos de acordo com a letra inicial-->
    <div *dxTemplate="let contato of 'item'">
      <div class="contato-item">
        <strong>{{ contato.nome }}</strong>
        <span>{{ contato.telefone }}</span>
        <div class="botoes">
          <dx-button stylingMode="text">
            <img src="pencil-square.png">

          </dx-button>
          <dx-button stylingMode="text">
            <img src="trash.png">
          </dx-button>
        </div>
      </div>
    </div>
  </dx-list>

</app-container>
